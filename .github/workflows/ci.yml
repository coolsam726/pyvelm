# Unit tests + coverage on every push/PR to main.
# Integration tests use PYVELM_DSN_TEST (never PYVELM_DSN).
# Tests bootstrap their own schema (reset + install_modules) — no pyvelm migrate step.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-postgres:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pyvelm
          POSTGRES_PASSWORD: pyvelm
          POSTGRES_DB: pyvelm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pyvelm -d pyvelm"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PYVELM_DSN_TEST: postgresql://pyvelm:pyvelm@localhost:5432/pyvelm_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,geo]"

      - name: Create Postgres test database
        run: PGPASSWORD=pyvelm psql -h localhost -U pyvelm -d pyvelm -c "CREATE DATABASE pyvelm_test;"

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=pyvelm \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=90

      - name: Upload coverage to Codecov
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          slug: coolsam726/pyvelm
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  test-sqlite:
    runs-on: ubuntu-latest

    env:
      PYVELM_DSN_TEST: sqlite:////tmp/pyvelm-ci-test.db

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,geo]"

      - name: Run database portability tests
        run: pytest pyvelm/tests/test_database.py pyvelm/tests/test_database_routing.py -q
