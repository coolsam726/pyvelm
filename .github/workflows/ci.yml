# Unit tests + coverage on every push/PR to main.
# Postgres is available for integration tests that set PYVELM_DSN.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pyvelm
          POSTGRES_PASSWORD: pyvelm
          POSTGRES_DB: pyvelm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pyvelm -d pyvelm"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PYVELM_DSN: postgresql://pyvelm:pyvelm@localhost:5432/pyvelm

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,geo]"

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=pyvelm \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=65

      - name: Upload coverage to Codecov
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          slug: coolsam726/pyvelm
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
