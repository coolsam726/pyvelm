{# Dark-mode FOUC guard — must run before first paint. #}
<script>
    (function () {
        var t = localStorage.getItem('pyvelm-theme');
        if (t === 'dark' ||
            (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    })();
</script>
