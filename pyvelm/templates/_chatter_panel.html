{# Odoo-style chatter: filters, message feed (newest first), composer. #}
{% if chatter_context and chatter_context.enabled %}
<div id="pv-chatter-root"
     class="rounded-lg border border-default bg-neutral-primary flex flex-col max-h-[calc(100vh-8rem)]"
     x-data='pvChatter({{ chatter_context.composer_mode | tojson }})'>

    <div id="pv-chatter-inner" class="flex flex-col flex-1 min-h-0">
        {% include "_chatter_panel_inner.html" %}
    </div>
</div>
{% endif %}
