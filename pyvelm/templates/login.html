<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Sign in — pyvelm</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 antialiased min-h-screen flex items-center justify-center">
<div class="w-full max-w-sm">
    <div class="bg-white border border-gray-200 rounded-lg shadow-sm px-8 py-10">
        <h1 class="text-xl font-semibold mb-6 text-center">Sign in to pyvelm</h1>

        {% if error %}
        <p class="mb-4 text-sm text-red-600 bg-red-50 border border-red-200 rounded px-3 py-2">
            {{ error }}
        </p>
        {% endif %}

        <form method="post" action="/login" class="space-y-4">
            {% if next %}
            <input type="hidden" name="next" value="{{ next }}">
            {% endif %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1" for="login">
                    Username
                </label>
                <input
                    id="login" name="login" type="text" required autofocus
                    value="{{ prefill_login }}"
                    class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                >
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1" for="password">
                    Password
                </label>
                <input
                    id="password" name="password" type="password" required
                    class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                >
            </div>
            <button
                type="submit"
                class="w-full py-2 px-4 bg-blue-600 text-white text-sm font-medium rounded-md hover:bg-blue-700 transition">
                Sign in
            </button>
        </form>
    </div>
</div>
</body>
</html>
