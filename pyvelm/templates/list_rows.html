{% for row in rows %}
{% include "list_row.html" %}
{% endfor %}
{# When HTMX appends a "Load more" response, replace the existing load-more
   button with the next one (or remove it if this was the last page). #}
{% if has_more %}
<div id="pyvelm-load-more" hx-swap-oob="true" class="mt-4 flex justify-center">
    <button
        class="px-4 py-2 text-sm border border-gray-300 rounded-md bg-white hover:bg-blue-600 hover:text-white hover:border-blue-600 transition"
        hx-get="/web/records/{{ view.module }}/{{ view.name }}?page={{ page + 1 }}&page_size={{ page_size }}"
        hx-target="#pyvelm-rows"
        hx-swap="beforeend"
        hx-on::after-request="this.closest('#pyvelm-load-more').remove()">
        Load {{ page_size }} more
    </button>
</div>
{% endif %}
