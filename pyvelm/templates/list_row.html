<tr data-record-id="{{ row.id }}" class="hover:bg-neutral-secondary transition-colors">
    {% for cell in row.cells %}
    <td data-field="{{ cell.name }}" class="px-4 py-2.5 align-top text-body">{{ cell.html }}</td>
    {% endfor %}
    <td class="px-4 py-2.5 text-right whitespace-nowrap text-xs">
        <button class="text-fg-brand hover:underline font-medium mr-3"
                hx-get="/web/records/{{ view.module }}/{{ view.name }}/row/{{ row.id }}/edit"
                hx-target="closest tr"
                hx-swap="outerHTML">
            Edit
        </button>
        <button class="text-fg-danger hover:underline font-medium"
                hx-delete="/web/records/{{ view.module }}/{{ view.name }}/row/{{ row.id }}"
                hx-target="closest tr"
                hx-swap="outerHTML"
                hx-confirm="Delete this record?">
            Delete
        </button>
    </td>
</tr>
