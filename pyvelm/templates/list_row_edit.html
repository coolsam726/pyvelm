<tr data-record-id="{{ row.id or 'new' }}" class="bg-brand-softer/60">
    {% for cell in row.cells %}
    <td data-field="{{ cell.name }}" class="px-4 py-2.5 align-top">{{ cell.html }}</td>
    {% endfor %}
    <td class="px-4 py-2.5 text-right whitespace-nowrap text-xs">
        {% if row.id %}
        <button class="text-fg-success-strong hover:underline font-medium mr-3"
                hx-post="/web/records/{{ view.module }}/{{ view.name }}/row/{{ row.id }}"
                hx-include="closest tr"
                hx-target="closest tr"
                hx-swap="outerHTML">
            Save
        </button>
        <button class="text-body-subtle hover:text-heading hover:underline"
                hx-get="/web/records/{{ view.module }}/{{ view.name }}/row/{{ row.id }}"
                hx-target="closest tr"
                hx-swap="outerHTML">
            Cancel
        </button>
        {% else %}
        <button class="text-fg-success-strong hover:underline font-medium mr-3"
                hx-post="/web/records/{{ view.module }}/{{ view.name }}"
                hx-include="closest tr"
                hx-target="closest tr"
                hx-swap="outerHTML">
            Create
        </button>
        <button class="text-body-subtle hover:text-heading hover:underline"
                hx-on:click="this.closest('tr').remove()">
            Cancel
        </button>
        {% endif %}
    </td>
</tr>
